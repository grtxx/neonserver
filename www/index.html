<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Gemini MCP Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; background-color: #f4f7f6; }
        #chat-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; }
        #chat-window { height: 500px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; background: #fff; border-radius: 4px; display: flex; flex-direction: column; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #007bff; color: white; }
        .ai { align-self: flex-start; background-color: #e9ecef; color: #333; }
        .status { font-size: 0.8em; color: #888; margin-top: 5px; font-style: italic; }
        #input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        input:focus { border-color: #007bff; }
        button { padding: 10px 25px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        .tool-call { color: #d63384; font-family: monospace; font-size: 0.9em; background: #fff0f6; padding: 2px 5px; border-radius: 3px; }
    </style>
    <script type="text/javascript" src="showdown.min.js"></script>
</head>
<body>

<div id="chat-container">
    <h2>Gemini AI + MCP Tools - <span id="titlebox"></span><br />
    <div style="font-size:0.5em;" id="sidbox"></div></h2>
    <button onclick="newchat()">Új Chat</button>
    <div id="chat-window">
        <div class="message ai">Szia! Én egy Gemini asszisztens vagyok MCP toolokkal felvértezve. Miben segíthetek?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Írj valamit (pl. kérj egy véletlen számot)..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Küldés</button>
    </div>
</div>

<script>
    let chatWindow = document.getElementById("chat-window");
    let userInput = document.getElementById("userInput");
    let ws = null
    let currentAiMessageDiv = null;
    let sid = window.localStorage.getItem("chat_sid");

    if ( sid == "undefined" || sid == null || sid == "" || sid == "null" ) {
        fetch("/api/v1/createChat", { method: "POST" })
            .then(response => response.json())
            .then(data => {
                sid = data.sid;
                window.localStorage.setItem("chat_sid", sid);
                console.log("Új chat session létrehozva, SID:", sid);
                initWebSocket(sid);
            });
    }
    else {
        console.log("Loaging existing chat session - SID:", sid);
        initWebSocket(sid);
    }

    function initWebSocket( sid ) {
        document.querySelector("#sidbox").innerText = sid;

        ws = new WebSocket(`ws://localhost:8010/ws/${sid}`);
                
        ws.onopen = () => console.log("Kapcsolódva a szerverhez (8010)");
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === "token") {
                if (!Array.isArray(data.content)) {
                    data.content = [ data.content ]
                }
                for ( c in data.content ) {
                    let content = data.content[c];
                    if ( ! content.text ) {
                        content = { text: content };
                    }
                    // Ha ez az első token az AI-tól, csinálunk neki egy buborékot
                    if (!currentAiMessageDiv) {
                        currentAiMessageDiv = document.createElement("div");
                        currentAiMessageDiv.className = "message ai";
                        chatWindow.appendChild(currentAiMessageDiv);
                    }
                    
                    // Ha a szöveg csillagok között van, tool hívásként formázzuk
                    if ( content.text.startsWith("*") && content.text.endsWith("* ")) {
                        currentAiMessageDiv.innerHTML += `<span class="tool-call">${content.text.replace(/\*/g, '')}</span>`;
                    } else {
                        let output = ""
                        output += content.text;
                        if ( content.output ) {
                            output += "<div><pre>" + content.output + "</pre></div>";
                        }
                        let sd = new showdown.Converter();
                        currentAiMessageDiv.innerHTML += sd.makeHtml(output);
                    }
                }

                chatWindow.scrollTop = chatWindow.scrollHeight;
            } 
            else if (data.type === "done") {
                currentAiMessageDiv = null; // Felkészülés a következő válaszra
            } 
            else if (data.type === "title") {
                document.getElementById("titlebox").innerText = data.content; // Megváltoztatjuk az oldal címét
            } 
            else if (data.type === "error") {
                alert("Hiba történt: " + data.content);
            }
        };
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === "") return;

        // Felhasználói üzenet megjelenítése
        const userDiv = document.createElement("div");
        userDiv.className = "message user";
        userDiv.innerText = text;
        chatWindow.appendChild(userDiv);

        // Küldés WebSocketen
        ws.send(text);
        
        userInput.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === "Enter") sendMessage();
    }

    function newchat() {
        window.localStorage.removeItem("chat_sid");
        location.reload();
    }
</script>

</body>
</html>
